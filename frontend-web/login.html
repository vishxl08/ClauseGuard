<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ClauseGuard</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 4rem auto;
            padding: 2.5rem;
            text-align: center;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            margin-top: 2rem;
        }
        .form-group {
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-glass);
            color: var(--text-main);
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }
        .form-group input:focus {
            border-color: var(--primary);
        }
        .auth-btn {
            width: 100%;
            justify-content: center;
            margin-top: 1rem;
        }
        .auth-switch {
            margin-top: 1.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .auth-switch a {
            color: var(--primary);
            text-decoration: none;
            cursor: pointer;
            font-weight: 500;
        }
        .auth-error {
            color: var(--red);
            font-size: 0.9rem;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <div class="app-container">
        <header>
            <div class="logo">
                <i class="fa-solid fa-shield-halved"></i>
                <h1>Clause<span>Guard</span></h1>
            </div>
            <p class="subtitle">Secure Legal Document Analysis</p>
        </header>

        <main>
            <div class="glass-card auth-container" id="login-box">
                <h2>Welcome Back</h2>
                <p class="text-muted" style="margin-top:0.5rem;">Sign in to your account</p>
                <div id="login-error" class="auth-error"></div>
                <form class="auth-form" id="login-form">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="login-email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit" class="btn-primary auth-btn">Sign In</button>
                </form>
                <div class="auth-switch">
                    Don't have an account? <a onclick="toggleAuth('register')">Create one</a>
                </div>
            </div>

            <div class="glass-card auth-container hidden" id="register-box">
                <h2>Create Account</h2>
                <p class="text-muted" style="margin-top:0.5rem;">Join ClauseGuard securely</p>
                <div id="register-error" class="auth-error"></div>
                <form class="auth-form" id="register-form">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="reg-email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="reg-password" required minlength="6">
                    </div>
                    <button type="submit" class="btn-primary auth-btn">Register</button>
                </form>
                <div class="auth-switch">
                    Already have an account? <a onclick="toggleAuth('login')">Sign In</a>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';

        function toggleAuth(type) {
            document.getElementById('login-error').style.display = 'none';
            document.getElementById('register-error').style.display = 'none';
            if(type === 'register') {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('register-box').classList.remove('hidden');
            } else {
                document.getElementById('register-box').classList.add('hidden');
                document.getElementById('login-box').classList.remove('hidden');
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            
            const formData = new URLSearchParams();
            formData.append('username', document.getElementById('login-email').value);
            formData.append('password', document.getElementById('login-password').value);
            
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                const data = await res.json();
                if(res.ok) {
                    localStorage.setItem('token', data.access_token);
                    window.location.href = 'index.html';
                } else {
                    throw new Error(data.detail || 'Login failed');
                }
            } catch (err) {
                const errDiv = document.getElementById('login-error');
                errDiv.textContent = err.message;
                errDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'Sign In';
            }
        });

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            
            const payload = {
                email: document.getElementById('reg-email').value,
                password: document.getElementById('reg-password').value
            };
            
            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if(res.ok) {
                    alert('Account created! Please sign in.');
                    toggleAuth('login');
                } else {
                    throw new Error(data.detail || 'Registration failed');
                }
            } catch (err) {
                const errDiv = document.getElementById('register-error');
                errDiv.textContent = err.message;
                errDiv.style.display = 'block';
            }
            btn.disabled = false;
            btn.innerHTML = 'Register';
        });
    </script>
</body>
</html>
