<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ClauseGuard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=2.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #F4F7F9 0%, #E2E8F0 100%);
        }
        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            text-align: center;
        }
        .auth-logo {
            font-size: 2rem;
            font-weight: 700;
            color: var(--dark-blue);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .auth-logo i { color: var(--primary); }
        .form-group {
            text-align: left;
            margin-top: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            background: #F9FAFB;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.8rem 1rem;
            border-radius: var(--radius-sm);
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }
        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 196, 154, 0.1);
        }
        .auth-btn { width: 100%; justify-content: center; margin-top: 1.5rem; padding: 0.8rem; }
        .auth-switch { margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem; }
        .auth-switch a { color: var(--primary); text-decoration: none; cursor: pointer; font-weight: 600; }
        .auth-error { color: var(--red); font-size: 0.9rem; margin-top: 1rem; display: none; background: var(--red-bg); padding: 0.75rem; border-radius: var(--radius-sm); }
    </style>
</head>
<body>
    <div class="card auth-container" id="login-box">
        <div class="auth-logo"><i class="fa-solid fa-shield-halved"></i> ClauseGuard</div>
        <p class="text-muted">Welcome back! Please enter your details.</p>
        <div id="login-error" class="auth-error"></div>
        <form id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary auth-btn">Sign in</button>
        </form>
        <div class="auth-switch">Don't have an account? <a onclick="toggleAuth('register')">Sign up</a></div>
    </div>

    <div class="card auth-container hidden" id="register-box">
        <div class="auth-logo"><i class="fa-solid fa-shield-halved"></i> ClauseGuard</div>
        <p class="text-muted">Create an account to start analyzing.</p>
        <div id="register-error" class="auth-error"></div>
        <form id="register-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="Create a password" required minlength="6">
            </div>
            <button type="submit" class="btn-primary auth-btn">Create account</button>
        </form>
        <div class="auth-switch">Already have an account? <a onclick="toggleAuth('login')">Sign in</a></div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';

        function toggleAuth(type) {
            document.getElementById('login-error').style.display = 'none';
            document.getElementById('register-error').style.display = 'none';
            if(type === 'register') {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('register-box').classList.remove('hidden');
            } else {
                document.getElementById('register-box').classList.add('hidden');
                document.getElementById('login-box').classList.remove('hidden');
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            
            const formData = new URLSearchParams();
            formData.append('username', document.getElementById('login-email').value);
            formData.append('password', document.getElementById('login-password').value);
            
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                const data = await res.json();
                if(res.ok) {
                    localStorage.setItem('token', data.access_token);
                    window.location.href = 'index.html';
                } else {
                    throw new Error(data.detail || 'Login failed');
                }
            } catch (err) {
                const errDiv = document.getElementById('login-error');
                errDiv.textContent = err.message;
                errDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'Sign in';
            }
        });

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            
            const payload = {
                email: document.getElementById('reg-email').value,
                password: document.getElementById('reg-password').value
            };
            
            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if(res.ok) {
                    alert('Account created! Please sign in.');
                    toggleAuth('login');
                } else {
                    throw new Error(data.detail || 'Registration failed');
                }
            } catch (err) {
                const errDiv = document.getElementById('register-error');
                errDiv.textContent = err.message;
                errDiv.style.display = 'block';
            }
            btn.disabled = false;
            btn.innerHTML = 'Create account';
        });
    </script>
</body>
</html>
